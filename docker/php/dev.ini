; Ajustes de PHP para desenvolvimento
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

opcache.enable = 1
opcache.validate_timestamps = 1
; Em bind mounts (Windows/Mac) cada stat() no código-fonte é caro; revalidar
; a cada request deixa toda a stack de arquivos do Laravel/Composer lenta.
; 2s ainda dá hot reload "instantâneo" na prática sem repetir os stats a
; cada requisição.
opcache.revalidate_freq = 2
opcache.max_accelerated_files = 20000

; Mesmo raciocínio para resolução de caminhos (require/include do Composer).
realpath_cache_size = 4096K
realpath_cache_ttl = 600

upload_max_filesize = 20M
post_max_size = 20M
memory_limit = 512M
